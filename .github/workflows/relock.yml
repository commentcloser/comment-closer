name: Relock (temp)

# Throwaway helper: regenerates package-lock.json on Linux (matching the CI
# runner) so its optional wasm32-wasi subtree is populated the way `npm ci`
# expects. Windows npm can't produce those nested entries. Upload the result as
# an artifact; it gets committed to the branch and this workflow is then removed.

on:
  workflow_dispatch: {}
  push:
    branches: [fix/lockfile-sync]

jobs:
  relock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Regenerate lockfile
        run: |
          rm -f package-lock.json
          npm install --package-lock-only --ignore-scripts
      - name: Verify npm ci is satisfied by the new lock
        run: npm ci --ignore-scripts
      - uses: actions/upload-artifact@v4
        with:
          name: package-lock
          path: package-lock.json
