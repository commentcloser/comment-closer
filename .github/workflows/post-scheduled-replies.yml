name: Post Scheduled Replies

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  post-replies:
    runs-on: ubuntu-latest
    steps:
      - name: Post scheduled replies
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://www.commentcloser.com/api/cron/post-scheduled-replies")
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $STATUS"
          echo "Response: $BODY"
