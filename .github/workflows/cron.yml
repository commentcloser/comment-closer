name: Cron jobs (manual fallback)

# MANUAL FALLBACK ONLY. Scheduling moved to Vercel Crons (vercel.json) because
# GitHub's `schedule:` trigger proved wildly unreliable for this repo — the
# "*/5" schedule actually fired only ~4-5 times per DAY. Vercel invokes the
# same endpoints with the same `Authorization: Bearer $CRON_SECRET` header
# (injected automatically from the CRON_SECRET env var on the project).
#
# Keep this workflow_dispatch so the endpoints can be triggered by hand
# (`gh workflow run cron.yml`) for debugging or if Vercel crons are down.
#
# Requires a repository secret CRON_SECRET whose value matches the CRON_SECRET
# environment variable in the production (Vercel) deployment.

on:
  workflow_dispatch: {}

# Never let two ticks overlap (a slow tick would otherwise double-process).
concurrency:
  group: cron
  cancel-in-progress: false

jobs:
  cron:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://www.commentcloser.com
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Verify CRON_SECRET is configured
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Repository secret CRON_SECRET is not set. Add it under Settings > Secrets and variables > Actions (value must match the production CRON_SECRET env var)."
            exit 1
          fi

      - name: Post scheduled replies
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w '\nHTTP %{http_code}\n' \
            --fail-with-body \
            "$BASE_URL/api/cron/post-scheduled-replies"

      # Runs even if the previous step failed, so one broken endpoint doesn't
      # silently stop the other. The job still fails overall if either fails.
      - name: Fetch TikTok Ads comments
        if: always()
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w '\nHTTP %{http_code}\n' \
            --fail-with-body \
            "$BASE_URL/api/cron/fetch-tiktok-ads-comments"

      - name: Backfill stuck sentiment
        if: always()
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w '\nHTTP %{http_code}\n' \
            --fail-with-body \
            "$BASE_URL/api/cron/backfill-sentiment"
