name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Dummy values so steps that load prisma.config.ts (which reads
    # env("DATABASE_URL")) and the Next build's client init don't require real
    # production secrets. Applies to prisma generate / typecheck / test / build.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      NEXTAUTH_SECRET: ci-dummy-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Lint is currently informational (the inherited code has many pre-existing
      # lint findings). It reports but does not fail the build yet.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
